<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ระบบสลับวันหยุด - สำหรับ ผจก</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://static.line-scdn.net/liff/edge/2.1/sdk.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/th.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap');
        body { font-family: 'Kanit', sans-serif; }
    </style>
</head>

<body class="bg-gray-100 min-h-screen">
    <div class="max-w-md mx-auto p-4 relative">
        <input type="hidden" id="displayName" name="displayName">
        <input type="hidden" id="userId" name="userId">

        <div id="loadingOverlay" class="hidden fixed inset-0 flex items-center justify-center bg-black bg-opacity-50 z-50">
            <div class="bg-white p-5 rounded-lg shadow-lg text-center">
                <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-slate-800 mx-auto mb-2"></div>
                <div class="text-slate-800 text-sm">กำลังดำเนินการ...</div>
            </div>
        </div>

        <div class="flex justify-center items-center mb-6">
            <div class="bg-slate-800 rounded-2xl shadow-xl p-6 w-full text-white">
                <div class="flex items-center">
                    <img class="w-20 h-20 object-cover rounded-full border-2 border-white mr-4" id="userAvatar" src="https://cdn.pixabay.com/photo/2015/10/05/22/37/blank-profile-picture-973460_960_720.png">
                    <div class="flex-1">
                        <input type="text" class="w-full bg-transparent font-bold text-lg outline-none" id="columnBData" placeholder="ชื่อผู้จัดการ" readonly>
                        <input type="text" class="w-full bg-transparent text-sm opacity-80 outline-none" id="columnCData" placeholder="รหัสประจำตัว" readonly>
                        <input type="text" class="w-full bg-transparent text-sm opacity-80 outline-none" id="columnDData" placeholder="ตำแหน่ง" readonly>
                    </div>
                </div>
            </div>
        </div>

        <form id="swapForm" class="space-y-4">
            <div class="bg-white p-6 shadow-xl rounded-2xl">
                <div class="mb-4">
                    <input type="text" class="w-full bg-slate-100 p-3 text-slate-600 text-sm text-center rounded-xl font-bold" id="typeId" value="สลับวันหยุดให้พนักงาน" readonly>
                </div>

                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div>
                        <label class="block text-xs font-medium text-gray-500 mb-1">วันที่จะให้มา</label>
                        <input type="text" id="comeDateId" class="date-picker w-full p-3 border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-slate-800 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-500 mb-1">วันที่จะให้หยุด</label>
                        <input type="text" id="offDateId" class="date-picker w-full p-3 border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-slate-800 outline-none">
                    </div>
                </div>

                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">เลือกพนักงานที่ต้องการสลับวัน:</label>
                    <div id="employeeList" class="border border-gray-200 rounded-xl p-2 max-h-60 overflow-y-auto bg-gray-50 text-xs">
                        <p class="text-center py-4 text-gray-400 italic">กำลังโหลดรายชื่อพนักงาน...</p>
                    </div>
                    <input type="hidden" id="selectedEmployeeName">
                    <input type="hidden" id="selectedEmployeeNumber">
                    <input type="hidden" id="selectedEmployeeEmail">
                    <input type="hidden" id="selectedEmployeeNickname">
                </div>

                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">รายละเอียดเพิ่มเติม</label>
                    <textarea id="detailId" rows="2" placeholder="เหตุผลหรือหมายเหตุ..." class="w-full p-3 border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-slate-800 outline-none"></textarea>
                </div>

                <div class="bg-slate-50 rounded-xl p-4 mb-6 border border-dashed border-gray-300">
                    <label for="file" class="cursor-pointer block text-center">
                        <span class="text-slate-700 text-sm block font-medium">อัปโหลดเอกสารประกอบ (ถ้ามี)</span>
                        <input type="file" id="file" accept=".jpg,.jpeg,.png,.pdf" class="hidden">
                        <div id="fileNameDisplay" class="text-slate-400 text-xs mt-1 italic">ยังไม่ได้เลือกไฟล์</div>
                    </label>
                </div>

                <button type="button" id="submitBtn" class="w-full bg-slate-800 text-white font-bold py-4 rounded-xl hover:bg-slate-700 transition duration-300 shadow-lg">
                    บันทึกและส่งขออนุมัติ
                </button>
            </div>
        </form>
    </div>

    <script>
        // --- การตั้งค่าหลัก ---
        const SWAP_APP_URL = "https://script.google.com/macros/s/AKfycbzwzh2deVPd5nBGpOFOPrzLhCo0tFTTKPACaTw2mRGRaZUAb9XfW8Q5fEkW1wmSduYjTw/exec"; 
        const LIFF_ID = "2008131502-qLwFqaJi";

        // เริ่มต้นระบบ
        window.onload = async function() {
            initFlatpickr();
            await initializeLiff();
        };

        function initFlatpickr() {
            flatpickr(".date-picker", {
                locale: "th",
                dateFormat: "Y-m-d",
                altInput: true,
                altFormat: "d/m/Y",
                minDate: "today",
                disableMobile: "true"
            });
        }

        // เชื่อมต่อ LIFF
        async function initializeLiff() {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) {
                    liff.login();
                } else {
                    const profile = await liff.getProfile();
                    document.getElementById('userId').value = profile.userId;
                    document.getElementById('displayName').value = profile.displayName;
                    await fetchUserData(profile.userId);
                }
            } catch (error) {
                console.error('LIFF Error:', error);
            }
        }

        // ฟังก์ชันหัวใจหลัก: เรียกใช้ GAS (แก้ปัญหา CORS)
        async function callGAS(payload) {
            const response = await fetch(SWAP_APP_URL, {
                method: "POST",
                mode: "no-cors", // ใช้โหมดนี้เพื่อเลี่ยง Preflight ถ้าจำเป็น หรือปรับ Header ฝั่ง GAS
                headers: { "Content-Type": "text/plain;charset=utf-8" },
                body: JSON.stringify(payload)
            });
            // หมายเหตุ: mode: 'no-cors' จะทำให้อ่านค่า response.json() ไม่ได้ 
            // หาก GAS ตั้งค่า 'Anyone' และส่ง JSON กลับมาดีๆ ให้ใช้ mode: 'cors' ปกติ
            const res = await fetch(SWAP_APP_URL, {
                method: "POST",
                body: JSON.stringify(payload)
            });
            return await res.json();
        }

        // ดึงข้อมูลผู้ใช้และตรวจสอบสิทธิ์
        async function fetchUserData(userId) {
            showLoading(true);
            try {
                const data = await callGAS({ action: 'fetchUserData', userId: userId });
                if (data.success) {
                    const user = data.userRole;
                    document.getElementById('columnBData').value = user[2] || '';
                    document.getElementById('columnCData').value = user[3] || '';
                    document.getElementById('columnDData').value = user[4] || '';
                    document.getElementById('userAvatar').src = user[5] || '';

                    if (user[4] === 'ผจก') {
                        await fetchAllEmployees();
                    } else {
                        document.getElementById('swapForm').innerHTML = `<div class="bg-red-50 text-red-600 p-10 rounded-2xl text-center font-bold">คุณไม่มีสิทธิ์เข้าถึงหน้านี้ (สำหรับผู้จัดการเท่านั้น)</div>`;
                    }
                }
            } catch (error) {
                console.error(error);
            } finally {
                showLoading(false);
            }
        }

        // ดึงรายชื่อพนักงาน
        async function fetchAllEmployees() {
            try {
                const data = await callGAS({ action: 'fetchAllEmployees' });
                if (data.success) {
                    displayEmployeeList(data.employees);
                }
            } catch (error) {
                document.getElementById('employeeList').innerHTML = '<p class="text-red-400">โหลดข้อมูลไม่สำเร็จ</p>';
            }
        }

        function displayEmployeeList(employees) {
            const listDiv = document.getElementById('employeeList');
            let html = '<table class="w-full text-left border-collapse"><thead><tr class="border-b"><th class="py-2">เลือก</th><th class="py-2">ชื่อ-สกุล</th><th class="py-2 text-right">รหัส</th></tr></thead><tbody>';
            
            employees.forEach(emp => {
                html += `
                    <tr class="border-b hover:bg-white cursor-pointer" onclick="selectRow(this)">
                        <td class="py-3 px-1">
                            <input type="radio" name="empRadio" 
                                data-name="${emp[2]}" data-id="${emp[3]}" 
                                data-nickname="${emp[13]}" data-email="${emp[15]}"
                                class="w-4 h-4 accent-slate-800" onchange="updateSelectedEmp(this)">
                        </td>
                        <td class="py-3 text-slate-700">${emp[2]}</td>
                        <td class="py-3 text-right text-slate-400">${emp[3]}</td>
                    </tr>
                `;
            });
            html += '</tbody></table>';
            listDiv.innerHTML = html;
        }

        function updateSelectedEmp(radio) {
            document.getElementById('selectedEmployeeName').value = radio.dataset.name;
            document.getElementById('selectedEmployeeNumber').value = radio.dataset.id;
            document.getElementById('selectedEmployeeNickname').value = radio.dataset.nickname;
            document.getElementById('selectedEmployeeEmail').value = radio.dataset.email;
        }

        function selectRow(row) {
            const radio = row.querySelector('input[type="radio"]');
            radio.checked = true;
            updateSelectedEmp(radio);
        }

        // จัดการไฟล์
        document.getElementById('file').addEventListener('change', function(e) {
            const name = e.target.files[0]?.name || 'ยังไม่ได้เลือกไฟล์';
            document.getElementById('fileNameDisplay').textContent = name;
        });

        async function getBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result.split(',')[1]);
                reader.onerror = error => reject(error);
            });
        }

        // ส่งข้อมูล
        document.getElementById('submitBtn').addEventListener('click', async () => {
            const empName = document.getElementById('selectedEmployeeName').value;
            const comeDate = document.getElementById('comeDateId').value;
            const offDate = document.getElementById('offDateId').value;

            if (!empName || !comeDate || !offDate) {
                return Swal.fire('ข้อมูลไม่ครบ', 'กรุณาเลือกพนักงานและวันที่ให้ครบถ้วน', 'warning');
            }

            const confirm = await Swal.fire({
                title: 'ยืนยันการบันทึก?',
                text: `สั่งสลับวันหยุดให้คุณ ${empName}`,
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: '#1e293b',
                confirmButtonText: 'ยืนยัน',
                cancelButtonText: 'ยกเลิก'
            });

            if (confirm.isConfirmed) {
                showLoading(true);
                try {
                    const payload = {
                        action: 'submitSwapHoliday',
                        managerLineId: document.getElementById('userId').value,
                        managerName: document.getElementById('columnBData').value,
                        managerNumber: document.getElementById('columnCData').value,
                        managerRole: document.getElementById('columnDData').value,
                        employeeName: empName,
                        employeeNumber: document.getElementById('selectedEmployeeNumber').value,
                        employeeNickname: document.getElementById('selectedEmployeeNickname').value,
                        employeeEmail: document.getElementById('selectedEmployeeEmail').value,
                        requestType: document.getElementById('typeId').value,
                        comeDate: comeDate,
                        offDate: offDate,
                        detail: document.getElementById('detailId').value
                    };

                    const fileInput = document.getElementById('file');
                    if (fileInput.files.length > 0) {
                        const file = fileInput.files[0];
                        payload.base64 = await getBase64(file);
                        payload.type = file.type;
                        payload.name = file.name;
                    }

                    const result = await callGAS(payload);
                    if (result.success) {
                        await Swal.fire('สำเร็จ!', 'บันทึกข้อมูลและส่งอีเมลแจ้งพนักงานแล้ว', 'success');
                        liff.closeWindow();
                    } else {
                        throw new Error(result.message);
                    }
                } catch (error) {
                    Swal.fire('เกิดข้อผิดพลาด', error.message, 'error');
                } finally {
                    showLoading(false);
                }
            }
        });

        function showLoading(show) {
            document.getElementById('loadingOverlay').classList.toggle('hidden', !show);
        }
    </script>
</body>
</html>
